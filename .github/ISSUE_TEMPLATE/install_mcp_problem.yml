name: Install or MCP problem
description: Get help with installation, CLI setup, or Codex App MCP registration.
title: "[Install/MCP]: "
labels:
  - support
  - install
body:
  - type: markdown
    attributes:
      value: |
        Use this form for public installation or MCP setup issues. Do not paste session tokens, API keys, auth codes, private file contents, or full Codex transcripts.
  - type: dropdown
    id: mode
    attributes:
      label: Setup mode
      options:
        - Official shared alpha
        - Local development server
        - Self-hosted server
        - Codex App MCP
        - Codex CLI only
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS, Ubuntu, etc.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: node --version
  - type: textarea
    id: commands
    attributes:
      label: Commands run
      description: Paste only sanitized commands and output.
      render: shell
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Result
      placeholder: What failed or looked wrong?
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description: Useful commands include `npm run cli -- doctor`, `npm run cli -- auth providers`, and `npm run cli -- bridge status`.
      render: text
