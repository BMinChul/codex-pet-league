services:
  codex-pet-league:
    build: .
    image: codex-pet-league:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "4317"
      CODEX_PET_STATE_PATH: /app/data/league-state.json
      CODEX_PET_SQLITE_PATH: /app/data/league-state.sqlite
      CODEX_PET_ASSET_ROOT: /app/data/assets
      CODEX_PET_REALTIME_BUS: ${CODEX_PET_REALTIME_BUS:-local}
      CODEX_PET_REQUEST_GUARD: ${CODEX_PET_REQUEST_GUARD:-local}
      CODEX_PET_DISTRIBUTED_LOCK: ${CODEX_PET_DISTRIBUTED_LOCK:-local}
      CODEX_PET_REDIS_URL: ${CODEX_PET_REDIS_URL:-}
      CODEX_PET_POSTGRES_URL: ${CODEX_PET_POSTGRES_URL:-}
      CODEX_PET_POSTGRES_SNAPSHOT_RETENTION: ${CODEX_PET_POSTGRES_SNAPSHOT_RETENTION:-500}
    ports:
      - "4317:4317"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
